services:
  - type: web
    name: automated-video-editor-lite
    runtime: python
    rootDir: backend-lite
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: YOUTUBE_BACKEND_REDIRECT_URI
        sync: false
      - key: TRIAL_DAYS
        value: 60
      - key: MAX_UPLOAD_MB
        value: 500
